
<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting…</title>
    <meta http-equiv="refresh" content="0; url=./?redirect=true">
    <script>
      // If direct nav to /sub/route, rewrite to index with encoded path
      (function() {
        var l = window.location;
        var newUrl = l.protocol + '//' + l.host + l.pathname.replace(/\/[^/]*$/, '/') + '?p=' + encodeURIComponent(l.pathname + l.search) + l.hash;
        window.location.replace(newUrl);
      })();
    </script>
  </head>
  <body>Redirecting…</body>
</html>
